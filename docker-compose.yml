version: '3.8'

services:
  # MongoDB Database
  mongodb:
    image: mongo:7
    container_name: cosmodent-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: cosmodent
      MONGO_INITDB_ROOT_PASSWORD: cosmodent123
      MONGO_INITDB_DATABASE: cosmodent
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - cosmodent-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API Server
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cosmodent-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
      MONGODB_URI: mongodb://cosmodent:cosmodent123@mongodb:27017/cosmodent?authSource=admin
      JWT_SECRET: ${JWT_SECRET:-your-production-jwt-secret-key}
      JWT_EXPIRES_IN: 7d
      JWT_REFRESH_EXPIRES_IN: 30d
      CORS_ORIGIN: http://localhost:3000
    ports:
      - "3001:3001"
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - cosmodent-network
    volumes:
      - backend-uploads:/app/uploads
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Frontend Next.js Application
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:3001
        NEXT_PUBLIC_WS_URL: http://localhost:3001
    container_name: cosmodent-frontend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: http://localhost:3001
      NEXT_PUBLIC_WS_URL: http://localhost:3001
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - cosmodent-network

networks:
  cosmodent-network:
    driver: bridge

volumes:
  mongodb_data:
    driver: local
  backend-uploads:
    driver: local
